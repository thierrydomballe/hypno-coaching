[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/en"
  to = "/index-en.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
