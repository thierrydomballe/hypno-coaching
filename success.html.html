<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé | Thierry Domballe</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jost', sans-serif; background: #f5f0e8; color: #2c2c2c; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; }
        h1 { color: #4a6741; margin-bottom: 20px; }
        p { line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #4a6741; color: white; text-decoration: none; padding: 12px 25px; border-radius: 25px; transition: background 0.3s; }
        .btn:hover { background: #2c3a28; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Demande envoyée !</h1>
        <p>Merci pour votre message. J'ai bien reçu votre demande et je vous recontacte très prochainement pour notre entretien découverte.</p>
        <a href="/" class="btn">Retour au site</a>
    </div>
</body>
</html>
